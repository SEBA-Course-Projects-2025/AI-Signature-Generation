<!-- frontend.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signature Generator</title>
</head>

<body>
    <h2>Generate Signature</h2>
    <input type="text" id="textInput" placeholder="Enter name, for example Sophy">
    <button onclick="triggerGenerate()">Generate</button>
    <pre id="responseBox"></pre>
    <img id="preview" alt="Result will appear here" style="max-width: 100%; display:none" />

<script>
  let currentObjectUrl = null;

  async function triggerGenerate() {
    const text = document.getElementById('textInput').value;

    const response = await fetch('/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    const contentType = response.headers.get('Content-Type') || '';
    if (!response.ok) {
      let msg = `HTTP ${response.status}`;
      if (contentType.includes('application/json')) {
        const err = await response.json().catch(() => null);
        if (err) msg += `\n${JSON.stringify(err, null, 2)}`;
      }
      document.getElementById('responseBox').style.display = 'block';
      document.getElementById('responseBox').textContent = msg;
      document.getElementById('preview').style.display = 'none';
      return;
    }

    if (contentType.startsWith('image/')) {
      const blob = await response.blob();

      if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);

      currentObjectUrl = URL.createObjectURL(blob);
      const img = document.getElementById('preview');
      img.src = currentObjectUrl;
      img.style.display = 'block';

      document.getElementById('responseBox').style.display = 'none';
      document.getElementById('responseBox').textContent = '';
    } else if (contentType.includes('application/json')) {
      const result = await response.json();
      document.getElementById('responseBox').style.display = 'block';
      document.getElementById('responseBox').textContent = JSON.stringify(result, null, 2);
      document.getElementById('preview').style.display = 'none';
    } else {
      document.getElementById('responseBox').style.display = 'block';
      document.getElementById('responseBox').textContent = 'Unexpected content type: ' + contentType;
      document.getElementById('preview').style.display = 'none';
    }
  }
</script>
</body>

</html>
