name: CI - Unit tests

on:
  push:
    branches: [ main, hanna/backend ]
    paths:
      - "backend/**"
      - "unit_tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "backend/**"
      - "unit_tests/**"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/unit_tests/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          if [ -f unit_tests/requirements.txt ]; then pip install -r unit_tests/requirements.txt; fi

      - name: Run pytest
        run: |
          pytest -q unit_tests --maxfail=1 --disable-warnings --junitxml=pytest-report.xml --cov=backend --cov-report=xml

      - name: Upload test report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: |
            pytest-report.xml
            coverage.xml
